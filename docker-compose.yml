services:
  wechat:
    image: wechat-linux:latest
    # build: .
    container_name: wechat
    user: "1000:1000"
    # privileged: true
    ports:
      - "5900:5900"
    devices:
      - /dev/dri
    volumes:
      - /dev/shm:/dev/shm
      - ./.xwechat:/home/wechat/.xwechat
      - ./xwechat_files:/home/wechat/xwechat_files
      - ./downloads:/home/wechat/downloads
    environment:
      - DISPLAY=:1
      - RESOLUTION=1024x768x24
      - LANG=zh_CN.UTF-8
      - LANGUAGE=zh_CN:zh
      - LC_ALL=zh_CN.UTF-8
      - TZ=Asia/Shanghai
    restart: unless-stopped